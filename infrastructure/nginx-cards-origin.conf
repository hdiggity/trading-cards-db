server {
    listen 80;
    server_name cards-origin.harlanswitzer.com;
    # certbot will insert redirect here after: certbot --nginx -d cards-origin.harlanswitzer.com
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name cards-origin.harlanswitzer.com;

    # SSL managed by certbot
    ssl_certificate     /etc/letsencrypt/live/cards-origin.harlanswitzer.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cards-origin.harlanswitzer.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Only allow Cloudflare IPs (optional hardening - see https://www.cloudflare.com/ips/)
    # allow 103.21.244.0/22;
    # (add full Cloudflare IP ranges here)
    # deny all;

    location / {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";

        # large uploads (card scans)
        client_max_body_size 100m;
        proxy_read_timeout   300s;
        proxy_send_timeout   300s;
    }
}
